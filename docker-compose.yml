version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: z-ai-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-z_ai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-z_ai_password}
      POSTGRES_DB: ${DB_NAME:-z_ai_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-z_ai_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build: .
    container_name: z-ai-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-z_ai_user}:${DB_PASSWORD:-z_ai_password}@postgres:5432/${DB_NAME:-z_ai_db}
      DEBUG: ${DEBUG:-True}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ZAI_GLM_API_KEY: ${ZAI_GLM_API_KEY}
      ZAI_GLM_API_URL: ${ZAI_GLM_API_URL}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: z-ai-network
